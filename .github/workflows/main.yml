name: Auto Update Configs

on:
  push:
    branches:
      - main
    paths:
      - 'raw_configs.txt' # শুধু raw_configs.txt আপডেট হলেই এটি চলবে

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # পুশ করার পারমিশন
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Run encoding script
        run: python process.py

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add configuration.txt
          # যদি কোনো পরিবর্তন থাকে তবেই কমিট করবে
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update configuration.txt" && git push)
